<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css">
  </head>
  <body>
      <main class="py-8 px-60 mx-auto ">
         <!-- header -->
        <section class="space-y-5 border-b border-gray-400">
            <!-- heading -->
            <h1 class="text-3xl font-bold ">Job Application Tracker</h1>
            <!-- count section -->
            <div class="flex justify-between gap-6 mb-10">
                <div class="p-5 shadow-2xl border bg-[#F1F2F4] border-gray-100 w-full rounded-2xl">
                    <p class="text-gray-600">Total</p>
                    <h2 class="text-2xl font-bold">0</h2>
                </div>
                <div class="p-5 shadow-2xl border bg-[#F1F2F4] border-gray-100 w-full rounded-2xl">
                    <p  class="text-gray-600">Interview</p>
                    <h2 class="text-2xl font-bold text-green-600">0</h2>
                </div>
                <div class="p-5 shadow-2xl border bg-[#F1F2F4] border-gray-100 w-full rounded-2xl">
                    <p  class="text-gray-600">Rejected</p>
                    <h2 class="text-2xl font-bold text-red-600">0</h2>
                </div>
            </div>
        </section>

        <!-- card tab -->
         <section class="py-10">
            <div class="flex justify-between">
                <h1 class="text-2xl pb-5 font-bold">Available Jobs</h1>
                <p> jobs </p>
            </div>
            <div class="flex gap-6">
                <div class="py-2 px-4 rounded-[8px] border border-gray-300 bg-blue-500 text-white">
                <p>All</p>
                </div>
                <div class="py-2 px-4 rounded-[8px] border border-gray-300">
                    <p>Interview</p>
                </div>
                <div class="py-2 px-4 rounded-[8px] border border-gray-300">
                    <p>Rejected</p>
                </div>
            </div>
         </section>

         <!-- job cards -->
          <section>
            <!-- card -->
             <div>
                <!-- head -->
                <div class="flex justify-between">
                    <div>
                        <h1>Mobile First Corp</h1>
                        <h3>React Native Developer</h3>
                    </div>
                    <!-- delete btn -->
                     <div>
                        <button><img src="./img/Group 1.png" alt=""></button>
                     </div>
                </div>
                <!-- work type -->
                <div>
                    <p>remote .</p><p>Full Time</p><p>$1200</p>
                </div>
                <div></div>
                <div></div>
                <div></div>
             </div>
          </section>
     </main>

    <script src="script/script.js"></script>
  </body>
</html>
