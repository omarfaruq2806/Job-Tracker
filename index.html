<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/output.css" />
  </head>
  <body class="bg-[#e1dbdbf4]">

    <main class="w-250 mx-auto border border-b-black ">
      <header class="flex gap-5 pt-6">
        <div class="flex flex-col rounded-2xl p-6 bg-white w-full gap-2">
          <p class="text-2xl font-semibold">Total</p>
          <h1 class="text-3xl font-bold ">0</h1>
        </div>
        <div class="flex flex-col rounded-2xl p-6 bg-white w-full gap-2">
          <p class="text-2xl font-semibold">Interview</p>
          <h1 class="text-3xl font-bold text-green-600">0</h1>
        </div>
        <div class="flex flex-col rounded-2xl p-6 bg-white w-full gap-2">
          <p class="text-2xl font-semibold">Rejected</p>
          <h1 class="text-3xl font-bold text-red-600">0</h1>
        </div>
      </header>

      <section class="allSection">
        <!-- card-1 -->
         <div class="bg-white border rounded-xl p-6 shadow-sm">
      <div class="flex justify-between items-start">
        <div>
          <h2 class="text-xl font-semibold text-blue-900">
            Mobile First Corp
          </h2>
          <p class="text-gray-600 mt-1">React Native Developer</p>

          <p class="text-gray-500 text-sm mt-3">
            Remote • Full-time • $130,000 - $175,000
          </p>

          <span class="inline-block mt-4 px-4 py-1 text-sm font-medium bg-blue-100 text-blue-800 rounded-md">
            NOT APPLIED
          </span>

          <p class="text-gray-600 mt-4">
            Build cross-platform mobile applications using React Native.
            Work on products used by millions of users worldwide.
          </p>

          <div class="mt-5 flex gap-4">
            <button class="px-5 py-2 border border-green-500 text-green-600 rounded-md font-medium hover:bg-green-50">
              INTERVIEW
            </button>
            <button class="px-5 py-2 border border-red-500 text-red-600 rounded-md font-medium hover:bg-red-50">
              REJECTED
            </button>
          </div>
        </div>

        <button class="p-2 rounded-full border text-gray-400 hover:bg-gray-100">
          <img src="./img/Group 1.png" alt="">
        </button>
      </div>
    </div>

      </section>

      <!-- -------------------------------------------------------filter----------------------------------------------------------- -->
      <!-- filter interview section -->
      <section class="interviewSection hidden"></section>

      <!-- filter reject section -->
      <section class="rejectedSection hidden"></section>

    </main>

    <script src="script/script.js"></script>
  </body>
</html>
